<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="p-5 my-5 text-dark shadow-lg rounded" style="max-width: 500px; width: 100%; background-color: #f8f9fa;">
            <div class="text-center mb-4">
                <h1><span class="text-warning"><strong>Heat Index</strong></span> Checker</h1>
            </div>
            <div class="bg-white p-4 rounded mb-4 shadow-sm">
                <details ontoggle="if(this.open) alert('Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.')">
                    <summary class="btn btn-sm btn-outline-secondary mb-3">▼ Note:</summary>
                    <p class="small text-muted">Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>
                </details>

                <div class="col-12">
                    <label class="form-label"><strong>Degree in °C</strong></label>
                    <input type="number" id="temperature" class="form-control" placeholder="Input degree value"><br>
                    <label class="form-label"><strong>Humidity in %</strong></label>
                    <input type="number" id="humidity" class="form-control" placeholder="Input percentage value"><br>
                    <p id="display1" style="color:red; font-weight:bold; margin-top: 10px;"></p>
                </div>

                <div class="button-container d-flex justify-content-start">
                    <button class="btn btn-warning mt-2 p-2 w-25" onclick="checkHeatIndex()">Check</button>
                </div>
                <hr class="mt-4">
                <p class="text-center mt-3 small">
                    Source: <a href="https://www.weather.gov/ama/heatindex" target="_blank" class="text-decoration-none text-warning">
                        <strong>NOAA Heat Index Chart</strong>
                    </a>
                </p>

            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
